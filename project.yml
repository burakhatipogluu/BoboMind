name: BoboMind
options:
  bundleIdPrefix: com.bobomind
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: false

targets:
  BoboMind:
    type: application
    platform: macOS
    sources:
      - path: BoboMind
        excludes:
          - "Resources/**"
      - path: BoboMind/Resources/Assets.xcassets
        buildPhase: resources
      - path: BoboMind/Resources/AppLogo.png
        buildPhase: resources
    dependencies: []
    settings:
      base:
        SWIFT_VERSION: "5.10"
        PRODUCT_BUNDLE_IDENTIFIER: com.bobomind.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: BoboMind/BoboMind.entitlements
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_CFBundleDisplayName: BoboMind
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Burak Hatipoğlu"
        LSApplicationCategoryType: "public.app-category.utilities"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
